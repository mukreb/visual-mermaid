name: Release macOS app

# Builds the native macOS app (a universal .dmg / .app, runs on both Apple
# Silicon and Intel) and publishes it to a GitHub Release so it can be
# downloaded from the repo's Releases page.
#
# How to cut a release:
#   1. Bump "version" in package.json, src-tauri/tauri.conf.json and
#      src-tauri/Cargo.toml to match.
#   2. Tag the commit and push the tag, e.g.
#        git tag v0.1.0 && git push origin v0.1.0
#   3. This workflow builds the .dmg and attaches it to a release named after
#      the tag.
#
# You can also trigger it by hand from the Actions tab (workflow_dispatch),
# supplying a tag to release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Created from the current commit if it does not exist."
        required: true

# tauri-action needs to create the release and upload assets.
permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust (with macOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install JS dependencies
        run: npm ci

      - name: Build and publish the macOS app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Optional code signing + notarization ---
          # The build works without any of these (the app is shipped unsigned,
          # see the README for how users open an unsigned download). Set these
          # as repository secrets to produce a signed, notarized .dmg.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Visual Mermaid ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            Download the `.dmg` below, open it, and drag **Visual Mermaid** to Applications.

            This build is **not signed with an Apple Developer ID**. The first time you
            launch it, macOS Gatekeeper will block it. To open it anyway:

            - Right-click (or Control-click) the app and choose **Open**, then **Open** again, **or**
            - run `xattr -dr com.apple.quarantine "/Applications/Visual Mermaid.app"` in Terminal.
          releaseDraft: false
          prerelease: false
          # Universal binary => one .dmg that runs on Apple Silicon and Intel Macs.
          args: --target universal-apple-darwin
